baseURL: "https://sukkk-zcy.github.io/"
title: Sukkk's Blog
copyright: "©2026 Sukkk's Blog"
theme: PaperMod
languageCode: zh-cn

enableInlineShortcodes: true
hasCJKLanguage: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

languages:
  zh:
    languageName: "中文"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
    menus:
      main:
        - name: 首页
          pageRef: /
          weight: 4
        - name: 归档
          pageRef: archives/
          weight: 5
        - name: 分类
          pageRef: categories/
          weight: 10
        - name: 标签
          pageRef: tags/
          weight: 10
        - name: 搜索
          pageRef: search/
          weight: 20
        - name: 科研
          pageRef: research/
          weight: 15
        - name: 关于
          pageRef: about/
          weight: 21

paginate: 8

params:
  env: production
  description: "Sukkk's Blog"
  author: Sukkk
  defaultTheme: dark
  ShowShareButtons: false
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  comments: true
  images: []
  DateFormat: "2006-01-02"

  homeInfoParams:
    Title: "Hi, I am Sukkk"
    Content: "一个热爱学习的开发者，记录技术笔记和成长历程。欢迎来到我的博客。"

  socialIcons:
    - name: github
      title: Follow my Github
      url: "https://github.com/Sukkk-zcy"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
    includeMatches: true

  assets:
    favicon: "favicon.svg"
    favicon16x16: "favicon.svg"
    favicon32x32: "favicon.svg"
    apple_touch_icon: "favicon.svg"
    safari_pinned_tab: "favicon.svg"
    disableHLJS: true

  giscus:
    repo: "Sukkk-zcy/Sukkk-zcy.github.io"
    repoId: "R_kgDOTAOSug"
    category: "Announcements"
    categoryId: "DIC_kwDOTAOSus4C_lyu"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    lightTheme: "light"
    darkTheme: "dark"
    lang: "zh-CN"
    crossorigin: "anonymous"

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    anchorLineNos: false
    codeFences: true
    noClasses: false
    lineNos: true
    lineNumbersInTable: false
