baseURL = "https://sukkk-zcy.github.io/"
locale = "zh-cn"
title = "Sukkk's Blog"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
enableEmoji = true
hasCJKLanguage = true
defaultContentLanguage = "zh"

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true
  author = "Sukkk"
  description = "记录技术笔记和成长历程"
  copyright = "© 2026 Sukkk's Blog"

  [params.homeInfoParams]
    Title = "Hi, I'm Sukkk 👋"
    Content = "一个热爱学习的开发者，记录技术笔记和成长历程。欢迎来到我的博客，这里主要记录了我的学习笔记、技术教程和成长历程。"

  [params.profileMode]
    enabled = false

  [params.cover]
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/Sukkk-zcy/Sukkk-zcy.github.io/edit/master/content"
    Text = "编辑本文"
    appendFilePath = true

  [params.assets]
    disableHLJS = true
    favicon = ""
    favicon16x16 = ""
    favicon32x32 = ""
    apple_touch_icon = ""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Sukkk-zcy"

  [params.label]
    text = "Sukkk's Blog"
    icon = "✍️"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]
    includeMatches = true

  [params.giscus]
    repo = "Sukkk-zcy/Sukkk-zcy.github.io"
    repoId = ""
    category = "Announcements"
    categoryId = ""
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    lightTheme = "light"
    darkTheme = "dark"
    lang = "zh-CN"
    crossorigin = "anonymous"

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 5

[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 10

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 21

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = ""
    lineNos = false
    codeFences = true
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[[sitemap.changefreqs]]
  host = "default"
  changefreq = "weekly"
  priority = 0.5
