baseURL = "https://sukkk-zcy.github.io/"
locale = "zh-cn"
title = "Sukkk's Blog"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

  [params.homeInfoParams]
    Title = "Hi, I'm Sukkk 👋"
    Content = "一个热爱学习的开发者，记录技术笔记和成长历程。"

  [params.homeInfoParams.Image]
    url = ""
    width = 120
    height = 120

  [params.cover]
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/Sukkk-zcy/Sukkk-zcy.github.io/edit/master/content"
    Text = "编辑本文"
    appendFilePath = true

  [params.assets]
    disableHLJS = false

  [params.profileMode]
    enabled = true
    title = "Sukkk's Blog"
    subtitle = "代码 · 笔记 · 成长"
    imageUrl = ""
    imageTitle = "avatar"
    imageWidth = 150
    imageHeight = 150
    [[buttons]]
      name = "文章"
      url = "/posts"
    [[buttons]]
      name = "教程"
      url = "/tutorials"
    [[buttons]]
      name = "标签"
      url = "/tags"
    [[buttons]]
      name = "搜索"
      url = "/search"
    [[buttons]]
      name = "归档"
      url = "/archives"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Sukkk-zcy"

  [params.label]
    text = "Sukkk's Blog"
    icon = "✍️"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  [params.comments]
    giscus = { repo = "Sukkk-zcy/Sukkk-zcy.github.io", repoId = "", category = "Announcements", categoryId = "", mapping = "pathname", strict = "0", reactionsEnabled = "1", emitMetadata = "0", inputPosition = "top", lang = "zh-CN" }

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tutorials"
  name = "教程"
  url = "/tutorials/"
  weight = 20

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 30

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[[sitemap.changefreqs]]
  host = "default"
  changefreq = "weekly"
  priority = 0.5
