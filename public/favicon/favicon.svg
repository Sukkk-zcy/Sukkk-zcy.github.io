<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Network/Router icon -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)"/>
  <!-- Central node -->
  <circle cx="50" cy="50" r="12" fill="white"/>
  <!-- Connection lines -->
  <line x1="50" y1="38" x2="50" y2="18" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="50" y2="82" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="50" x2="18" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="50" x2="82" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="50" cy="15" r="6" fill="white"/>
  <circle cx="50" cy="85" r="6" fill="white"/>
  <circle cx="15" cy="50" r="6" fill="white"/>
  <circle cx="85" cy="50" r="6" fill="white"/>
  <!-- Diagonal connections -->
  <line x1="42" y1="42" x2="25" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="42" x2="75" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="58" x2="25" y2="75" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="58" x2="75" y2="75" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal nodes -->
  <circle cx="22" cy="22" r="5" fill="white"/>
  <circle cx="78" cy="22" r="5" fill="white"/>
  <circle cx="22" cy="78" r="5" fill="white"/>
  <circle cx="78" cy="78" r="5" fill="white"/>
</svg>
